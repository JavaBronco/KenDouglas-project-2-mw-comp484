<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>
        This is your Beagle
      </h1>
    </header>

    <main>
      <section class="pet-image-container">
         <!-- Replace pet image with your own pet image -->
        <img class="pet-image" src="images/hound.jpeg">
      </section>
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
        <div class="button-container">
          <button class="treat-button">
            Treat
          </button>
          <button class="play-button">
            Play
          </button>
          <button class="exercise-button">
            Exercise
          </button>
        </div>
      </section>

      <section class="pet-form-container">
        <h2>Update Pet Info</h2>
        <form class="pet-form">
          <div>
            <label for="pet-name">Name:</label>
            <input type="text" id="pet-name" name="name" placeholder="Enter pet name">
          </div>
          <div>
            <label for="pet-weight">Weight (lbs):</label>
            <input type="number" id="pet-weight" name="weight" min="0" placeholder="Enter weight">
          </div>
          <div>
            <label for="pet-happiness">Happiness:</label>
            <input type="number" id="pet-happiness" name="happiness" min="0" placeholder="Enter happiness">
          </div>
          <button type="submit" class="update-button">Update Pet</button>
        </form>
      </section>
    </main>

  </body>
</html>
